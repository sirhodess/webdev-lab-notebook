<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 01 - Audit</title>
  </head>
  <body>
    <form>
      <label for="name">Name:</label><br />
      <input type="text" id="name" name="name" /><br /><br />

      <label for="address">Address:</label><br />
      <input type="text" id="address" name="address" /><br /><br />

      <label for="city">City:</label><br />
      <input type="text" id="city" name="city" /><br /><br />

      <label for="zip">Zip Code:</label><br />
      <input type="text" id="zip" name="zip" /><br /><br />

      <fieldset>
        <legend>Credit Card Type:</legend>
        <input type="radio" id="visa" name="card" value="visa" />
        <label for="visa">Visa</label><br />

        <input type="radio" id="mastercard" name="card" value="mastercard" />
        <label for="mastercard">MasterCard</label><br />

        <input type="radio" id="amex" name="card" value="amex" />
        <label for="amex">American Express</label>
      </fieldset>

      <br />

      <label for="cc_number">Credit Card Number:</label><br />
      <input type="text" id="cc_number" name="cc_number" /><br /><br />

      <label for="cvv">CVV:</label><br />
      <input type="text" id="cvv" name="cvv" /><br /><br />

      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
