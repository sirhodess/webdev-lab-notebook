<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Exercise 02 - Form</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-xl-4">
          <div class="card">
            <div class="card-body">
              <h1 class="text-center fs-4 mb-4">Roth IRA Calculator</h1>

              <form>
                <div class="row mb-3 align-items-center">
                  <label for="balance" class="col-sm-6 col-form-label small">
                    Balance ($)
                  </label>
                  <div class="col-sm-6">
                    <input
                      type="text"
                      id="balance"
                      name="balance"
                      class="form-control form-control-sm"
                    />
                  </div>
                </div>

                <div class="row mb-3 align-items-center">
                  <label
                    for="annual-contribution"
                    class="col-sm-6 col-form-label small"
                  >
                    Annual Contribution ($)
                  </label>
                  <div class="col-sm-6">
                    <input
                      type="text"
                      id="annual-contribution"
                      name="annual-contribution"
                      class="form-control form-control-sm"
                    />
                  </div>
                </div>

                <fieldset class="row mb-3">
                  <legend class="col-sm-6 col-form-label small pt-0">
                    Maximize contributions?
                  </legend>

                  <div class="col-sm-6">
                    <div class="form-check">
                      <input
                        type="radio"
                        id="yes"
                        name="maximize"
                        value="yes"
                        class="form-check-input"
                      />
                      <label for="yes" class="form-check-label small">
                        Yes
                      </label>
                    </div>

                    <div class="form-check">
                      <input
                        type="radio"
                        id="no"
                        name="maximize"
                        value="no"
                        class="form-check-input"
                      />
                      <label for="no" class="form-check-label small">
                        No
                      </label>
                    </div>
                  </div>
                </fieldset>

                <div class="row mb-3 align-items-center">
                  <label for="rate" class="col-sm-6 col-form-label small">
                    Expected return (%)
                  </label>
                  <div class="col-sm-6">
                    <input
                      type="number"
                      id="rate"
                      name="rate"
                      class="form-control form-control-sm"
                    />
                  </div>
                </div>

                <div class="row mb-3 align-items-center">
                  <label
                    for="current-age"
                    class="col-sm-6 col-form-label small"
                  >
                    Current age
                  </label>
                  <div class="col-sm-6">
                    <input
                      type="number"
                      id="current-age"
                      name="current-age"
                      class="form-control form-control-sm"
                    />
                  </div>
                </div>

                <div class="row mb-3 align-items-center">
                  <label
                    for="retirement-age"
                    class="col-sm-6 col-form-label small"
                  >
                    Retirement age
                  </label>
                  <div class="col-sm-6">
                    <input
                      type="number"
                      id="retirement-age"
                      name="retirement-age"
                      class="form-control form-control-sm"
                    />
                  </div>
                </div>

                <div class="row mb-3 align-items-center">
                  <label for="tax-rate" class="col-sm-6 col-form-label small">
                    Tax rate (%)
                  </label>
                  <div class="col-sm-6">
                    <input
                      type="number"
                      id="tax-rate"
                      name="tax-rate"
                      class="form-control form-control-sm"
                    />
                  </div>
                </div>

                <div class="row mb-3">
                  <div class="col-sm-6 d-none d-sm-block"></div>

                  <div class="col-sm-6">
                    <div class="row g-2">
                      <div class="col-6">
                        <button
                          type="submit"
                          class="btn btn-primary btn-sm w-100"
                        >
                          Calculate
                        </button>
                      </div>

                      <div class="col-6">
                        <button
                          type="reset"
                          class="btn btn-outline-secondary btn-sm w-100"
                        >
                          Reset
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </form>

              <p class="small text-muted mb-0">
                This exercise is a simplified version of the Roth IRA Calculator
                at
                <a href="https://www.calculator.net/roth-ira-calculator.html">
                  Calculator.net
                </a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
